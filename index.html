<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <title>Web pal Manga</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #f99cd4;
            font-family: 'Inter', Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            padding: 20px;
        }

        h2 {
            color: #440034;
            margin-bottom: 10px;
        }

        /* Burbuja blanca para el texto */
        .content {
            max-width: 800px;
            margin: 20px auto;
            background-color: rgba(255, 255, 255, 0.92);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            color: #000;
        }

        hr {
            max-width: 600px;
            margin: 25px auto;
            border: 1px solid #ddd;
        }

        /* Imagen redonda con enlace */
        .image-link {
            display: inline-block;
            margin: 25px 0;
        }

        .featured-image {
            width: 280px;
            height: 280px;
            object-fit: cover;
            border-radius: 25px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
        }

        .featured-image:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>

<body>
    <!-- ============ Encabezado ============ -->
