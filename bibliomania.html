<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibliomania - Sepa la Bola</title>
    <link rel="icon" href="img/corazon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #121212;
            font-family: 'Inter', Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            color: #ffffff;
        }

        header {
            padding: 25px 20px;
        }

        h1 {
            color: #11ad21;
            margin: 0;
        }
        .carousel-container {
            position: relative;
            max-width: 100%;
            margin: 25px auto;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
        }

        .carousel {
            display: flex;
            transition: transform 0.5s ease-in-out;
            width: 100%;
        }

        .carousel img {
            width: 100%;
            height: auto;
            flex-shrink: 0;
            display: block;
            max-height: 85vh;           /* Evita que sea demasiado alto en celular */
            object-fit: contain;        /* Mantiene proporción sin deformar */
        }

        /* Flechas */
        .prev, .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.75);
            color: white;
            border: none;
            font-size: 28px;
            padding: 12px 16px;
            cursor: pointer;
            border-radius: 50%;
            z-index: 10;
            user-select: none;
        }

        .prev:hover, .next:hover { 
            background: #11ad21; 
        }

        .prev { left: 10px; }
        .next { right: 10px; }

        .info {
            margin-top: 18px;
            font-size: 18px;
            font-weight: 600;
            color: #11ad21;
        }

        .back-link {
            color: #11ad21;
            font-size: 18px;
            text-decoration: none;
            margin-top: 20px;
            display: inline-block;
        }

        /* Mejoras para móviles */
        @media (max-width: 768px) {
            .carousel-container {
                margin: 15px 10px;
                border-radius: 12px;
            }
            
            .prev, .next {
                padding: 10px 14px;
                font-size: 24px;
            }
            
            .content {
                margin: 10px 8px;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>BIBLIOMANIA</h1>
    </header>

    <div class="content">
        <div class="carousel-container">
            <button class="prev" onclick="moveSlide(-1)">❮</button>
            <div class="carousel" id="carousel"></div>
            <button class="next" onclick="moveSlide(1)">❯</button>
        </div>

        <div class="info" id="current-info">Página 1 de X</div>

        <a href="myhtml.html" class="back-link">← Volver a la página principal</a>
    </div>

    <script>
        const carousel = document.getElementById('carousel');
        const info = document.getElementById('current-info');
        
        const prefix = "655028861-Bibliomania-1-5-page-";
        const totalImages = 141;
        let currentIndex = 0;

        // Generar imágenes
        for (let i = 1; i <= totalImages; i++) {
            const num = i.toString().padStart(5, '0');
            const filename = `${prefix}${num}.jpg`;
            
            const img = document.createElement('img');
            img.src = `img/${filename}`;
            img.alt = `Página ${i}`;
            carousel.appendChild(img);
        }

        const totalSlides = totalImages;

        function updateInfo() {
            info.textContent = `Página ${currentIndex + 1} de ${totalSlides}`;
        }

        function moveSlide(direction) {
            currentIndex += direction;
            if (currentIndex >= totalSlides) currentIndex = 0;
            if (currentIndex < 0) currentIndex = totalSlides - 1;

            carousel.style.transform = `translateX(-${currentIndex * 100}%)`;
            updateInfo();
        }

        // Swipe táctil
        let startX = 0;
        carousel.addEventListener('touchstart', e => startX = e.touches[0].clientX);
        carousel.addEventListener('touchend', e => {
            const endX = e.changedTouches[0].clientX;
            if (startX - endX > 50) moveSlide(1);
            if (endX - startX > 50) moveSlide(-1);
        });

        updateInfo();
    </script>
</body>
</html>
